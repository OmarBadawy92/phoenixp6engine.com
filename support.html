<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix P6 Engine — Support</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#0d1b2a;
  --navy2:#112236;
  --orange:#e8620a;
  --text:#e8eaf0;
  --muted:#8899aa;
  --border:rgba(232,98,10,0.25);
}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--navy);
  color:var(--text);
}

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 5%;
  border-bottom:1px solid var(--border);
  background:rgba(13,27,42,0.95);
}

.logo {
  font-family:'Bebas Neue';
  font-size:22px;
  letter-spacing:2px;
}

.logo span { color:var(--orange); }

.container {
  max-width:900px;
  margin:80px auto;
  padding:0 5%;
}

h1 {
  font-family:'Bebas Neue';
  font-size:56px;
  letter-spacing:2px;
  margin-bottom:10px;
}

h1 span { color:var(--orange); }

p {
  color:var(--muted);
  line-height:1.6;
}

.card {
  margin-top:30px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:12px;
  padding:30px;
}

label {
  display:block;
  margin-top:10px;
  font-size:13px;
  color:var(--muted);
}

input, select, textarea {
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  outline:none;
}

button {
  width:100%;
  padding:14px;
  background:var(--orange);
  border:none;
  color:white;
  font-weight:700;
  cursor:pointer;
  border-radius:6px;
  font-family:'Rajdhani';
  letter-spacing:1px;
}

button:hover {
  background:#f07c2a;
}

.back {
  color:var(--muted);
  text-decoration:none;
  font-size:13px;
}

.back:hover { color:var(--orange); }
</style>
</head>

<body>

<nav>
  <div class="logo">PHOENIX <span>P6 ENGINE</span></div>
  <a class="back" href="index.html">← Back to Home</a>
</nav>

<div class="container">

  <h1>SUPPORT & <span>FEEDBACK</span></h1>
  <p>
    Send bug reports, enhancement ideas, or general questions.  
    Every request generates a unique Phoenix Ticket ID.
  </p>

  <div class="card">

<form id="supportForm"
      action="https://formsubmit.co/support@phoenixp6engine.com"
      method="POST"
      enctype="multipart/form-data">

  <!-- Disable captcha -->


  <!-- Stay on same page -->
  <input type="hidden" name="_next" value="https://phoenixp6engine.com/support.html">

  <!-- Email subject -->
  <input type="hidden" name="_subject" value="Phoenix P6 Engine Support Request">

  <!-- Auto reply email -->
  <input type="hidden" name="_autoresponse" id="auto_response">

  <!-- Ticket ID -->
  <input type="hidden" name="ticket_id" id="ticket_id">

  <!-- NAME -->
  <label>Name</label>
  <input type="text" name="name" placeholder="Your Name" required>

  <!-- EMAIL -->
  <label>Email</label>
  <input type="email" name="email" placeholder="Your Email" required>

  <!-- TYPE -->
  <label>Request Type</label>
  <select name="type" required>
    <option value="Enhancement Request">Enhancement Request</option>
    <option value="Bug Report">Bug Report</option>
    <option value="General Question">General Question</option>
  </select>

  <!-- MESSAGE -->
  <label>Message</label>
  <textarea name="message" rows="6" placeholder="Describe your request..." required></textarea>

  <!-- ATTACHMENT -->
  <label>Attach Screenshot (optional)</label>
  <input type="file" name="attachment" accept="image/*">

  <button type="submit">Send Message</button>

</form>

  </div>

</div>

<script>
document.getElementById("supportForm").addEventListener("submit", function () {

  // Generate ticket
  const ticket = "PX-" + Math.floor(100000 + Math.random() * 900000);

  // Get values
  const name = document.querySelector('[name="name"]').value;
  const email = document.querySelector('[name="email"]').value;
  const type = document.querySelector('[name="type"]').value;
  const message = document.querySelector('[name="message"]').value;

  // Set ticket field
  document.getElementById("ticket_id").value = ticket;

  // FULL email content (THIS will be sent back to customer)
  const fullMessage =
`Hello ${name},

Thank you for contacting Phoenix P6 Engine.

Your Ticket ID: ${ticket}
Request Type: ${type}

Your Message:
${message}

We will review your request and respond shortly.

— Phoenix P6 Engine Support Team`;

  // IMPORTANT: set it BEFORE submit is processed
  document.getElementById("auto_response").value = fullMessage;

});
</script>

</body>
</html>
